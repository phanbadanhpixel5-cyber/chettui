name: Build Flutter APK

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # THÊM DÒNG NÀY

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5  # ĐỔI TỪ @v4 THÀNH @v5
    
    - name: Setup Java
      uses: actions/setup-java@v5  # ĐỔI TỪ @v4 THÀNH @v5
      with:
        distribution: 'temurin'
        java-version: '17'
    
    # ... phần còn lại giữ nguyên
